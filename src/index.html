  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Pixelify Sans", sans-serif;
      cursor: default;
      image-rendering: pixelated;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overscroll-behavior: none;
    }
    canvas {
      touch-action: none;
    }
    #gameShell {
      position: relative;
      overflow: hidden;
      background: #000;
      flex: 0 0 auto;
    }
    @media (orientation: landscape) {
      #gameShell {
        width: min(100vw, calc(100vh * 1.6));
        height: min(100vh, calc(100vw / 1.6));
        aspect-ratio: 1280 / 800;
      }
    }
    @media (orientation: portrait) {
      #gameShell {
        width: 100vw;
        height: calc(100vh - 100px);
        align-self: flex-end;
      }
    }
    #gameCanvas, #pixiCanvas, #miniGameOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #pixiCanvas {
      display: block;
      z-index: 1;
    }
    #gameCanvas {
      display: block;
      z-index: 2;
    }
    #miniGameOverlay {
      display: none;
      z-index: 100;
    }
    #miniGameOverlay.active {
      display: block;
    }
  </style>
</head>
