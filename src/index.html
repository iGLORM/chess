<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess 2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
      cursor: default;
      image-rendering: pixelated;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #miniGameOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
    }
    #miniGameOverlay.active {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1280" height="800"></canvas>
  <canvas id="miniGameOverlay" width="1280" height="800"></canvas>

  <script>gsap.registerPlugin(PixiPlugin); PixiPlugin.registerPIXI(PIXI);</script>
