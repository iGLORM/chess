<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chess 2.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: "Pixelify Sans", sans-serif;
      cursor: default;
      image-rendering: pixelated;
      -webkit-user-select: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overscroll-behavior: none;
    }
    canvas {
      touch-action: none;
    }
    #gameCanvas, #pixiCanvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }
    #pixiCanvas {
      z-index: 1;
    }
    #gameCanvas {
      z-index: 2;
    }
    #miniGameOverlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
    }
    #miniGameOverlay.active {
      display: block;
    }
    #rotateHint {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(10,10,26,0.95);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: "Pixelify Sans", sans-serif;
    }
    #rotateHint .icon { font-size: 48px; transform: rotate(90deg); }
    #rotateHint .msg { margin-top: 20px; font-size: 18px; }
    #rotateHint .sub { margin-top: 10px; font-size: 14px; opacity: 0.6; }
  </style>
</head>
